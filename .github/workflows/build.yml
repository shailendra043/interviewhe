name: Build Windows Executable

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install PyAudio dependencies
      run: |
        python -m pip install --upgrade pip
        # PyAudio wheels are available for Windows on standard PyPI for Python 3.11
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "InterviewHelpAI" "src/main.py"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InterviewHelpAI-Windows
        path: dist/InterviewHelpAI/
